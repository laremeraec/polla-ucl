name: AutoSync Polla UCL

# Bot sincronizador para la Polla UCL — Semifinales Champions League 2025-2026.
# Corre cada 5 minutos en GitHub Actions y actualiza Firebase con los resultados en vivo.

on:
  schedule:
    # Corre cada 5 minutos durante los días de partidos (5 y 6 de mayo 2026).
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Permite forzar una sincronización manual desde el panel de GitHub Actions.

jobs:
  run-bot-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Descargando Código
        uses: actions/checkout@v4

      - name: Instalando Servidor Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalando Dependencias (Axios, Firebase)
        run: |
          cd bot
          npm install

      - name: 🚀 Sincronizando Resultados Semifinales UCL en Vivo desde API
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        run: |
          cd bot
          node sync_ucl.js
